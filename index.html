<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Engelmig — Gestão de Manutenção</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--eng-yellow:#F5C400;--eng-red:#D32F2F;--eng-green:#2E7D32;--eng-dark:#1a2a4a;--sw:220px}
html,body{height:100%;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:14px;color:#333;background:#f4f6f9;overflow-x:hidden}
.hidden{display:none!important}
.login-wrap{min-height:100vh;min-height:100dvh;background:var(--eng-dark);display:flex;flex-direction:column-reverse}
@media(min-width:700px){.login-wrap{flex-direction:row}}
.login-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1rem;border-top:1px solid rgba(255,255,255,0.07)}
@media(min-width:700px){.login-left{border-top:none;border-right:1px solid rgba(255,255,255,0.07);padding:2.5rem 2rem}}
.login-right{display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem;background:var(--eng-dark)}
@media(min-width:700px){.login-right{width:380px;flex-shrink:0;padding:2rem}}
.login-box{background:#fff;border-radius:8px;padding:1.75rem;width:100%;max-width:380px}
.login-err{color:#dc3545;font-size:12px;margin-top:8px;text-align:center;display:none}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);background:var(--eng-dark);display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;height:100vh;z-index:200;transform:translateX(-100%);transition:transform 0.25s ease}
.sidebar.open{transform:translateX(0)}
@media(min-width:900px){.sidebar{position:relative;transform:none}}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:199}
.sb-overlay.show{display:block}
@media(min-width:900px){.sb-overlay{display:none!important}}
.sb-brand{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.sb-logo{width:38px;height:38px;background:var(--eng-yellow);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-user{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-user-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-org{font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px}
.sb-nav{flex:1;padding:6px 0;overflow-y:auto}
.nav-grp{font-size:10px;color:rgba(255,255,255,0.28);padding:10px 16px 4px;letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:11px 16px;font-size:13px;color:rgba(255,255,255,0.55);cursor:pointer;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.08);color:#fff}
.nav-item.active{border-left-color:var(--eng-yellow)}
.nav-item i{font-size:16px;width:18px;flex-shrink:0}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.08)}
.btn-sair{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.45);cursor:pointer;background:none;border:none}
.btn-sair:hover{color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0;gap:8px}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0}
.hamburger{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:6px;cursor:pointer;color:#555;flex-shrink:0;background:none;border:none;font-size:20px}
@media(min-width:900px){.hamburger{display:none}}
.topbar-title{font-size:14px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}
.sec{background:#fff;border:1px solid #e0e0e0;border-radius:6px;margin-bottom:10px;overflow:hidden}
.sec-hdr{padding:11px 14px;background:#f8f9fa;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.sec-title{font-size:13px;font-weight:600;color:#333;display:flex;align-items:center;gap:8px}
.sec-title i{font-size:15px;color:var(--eng-dark)}
.sec-body{padding:14px}
.sec-body.col{display:none}
.chev{color:#aaa;font-size:14px;transition:transform 0.2s}
.chev.op{transform:rotate(180deg)}
.fg{margin-bottom:0}
.fg label{display:block;font-size:11px;color:#666;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:4px;font-size:14px;color:#333;background:#fff;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--eng-dark);box-shadow:0 0 0 3px rgba(26,42,74,0.1)}
.fg input[readonly]{background:#f5f5f5;color:#777}
.fg textarea{resize:vertical;min-height:90px}
.gr{display:grid;gap:10px;margin-bottom:10px}
.gr1{grid-template-columns:1fr}
.gr2{grid-template-columns:1fr 1fr}
.gr3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:600px){.gr2,.gr3{grid-template-columns:1fr}}
.btn{padding:10px 16px;border-radius:4px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid #ccc;background:#fff;color:#333;min-height:42px}
.btn-green{background:var(--eng-green);color:#fff;border-color:var(--eng-green)}
.btn-red{background:var(--eng-red);color:#fff;border-color:var(--eng-red)}
.btn-dark{background:var(--eng-dark);color:#fff;border-color:var(--eng-dark)}
.btn-sm{padding:6px 12px;font-size:12px;min-height:32px}
.btn-block{width:100%}
.bdg{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 8px;border-radius:4px;font-weight:600;border:1px solid;white-space:nowrap}
.bdg-P{background:#fff3cd;color:#856404;border-color:#ffc107}
.bdg-A{background:#d4edda;color:#155724;border-color:#28a745}
.bdg-C{background:#f8d7da;color:#721c24;border-color:#dc3545}
.bdg-F{background:#cce5ff;color:#004085;border-color:#007bff}
.mtr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:700px){.mtr-grid{grid-template-columns:repeat(4,1fr)}}
.mtr{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:14px;border-top:3px solid var(--eng-dark)}
.mtr.y{border-top-color:var(--eng-yellow)}
.mtr.g{border-top-color:#28a745}
.mtr.b{border-top-color:#007bff}
.mtr-lbl{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.mtr-val{font-size:26px;font-weight:700}
.sol{background:#fff;border:1px solid #e0e0e0;border-radius:6px;margin-bottom:10px;overflow:hidden}
.sol-hdr{padding:12px 14px;background:#f8f9fa;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.sol-placa{display:inline-block;background:var(--eng-dark);color:var(--eng-yellow);padding:3px 10px;border-radius:3px;font-size:13px;font-weight:700;letter-spacing:1px}
.sol-meta{font-size:11px;color:#888;margin-top:4px}
.sol-body{padding:12px 14px}
.sol-info{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;font-size:13px}
@media(min-width:600px){.sol-info{grid-template-columns:repeat(3,1fr)}}
.sol-info-lbl{color:#888;font-size:11px;margin-bottom:2px}
.sol-info-val{font-weight:600;color:#333}
.retorno{background:#eef4ff;border-left:3px solid var(--eng-dark);padding:10px 12px;border-radius:0 4px 4px 0;margin-top:10px}
.retorno-title{font-size:10px;font-weight:700;color:var(--eng-dark);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:5px}
.retorno-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:13px}
.agend-body{padding:12px 14px;border-top:1px solid #e0e0e0;background:#fafafa}
.agend-lbl{font-size:11px;font-weight:700;color:#555;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.tbl th{background:#f8f9fa;border:1px solid #dee2e6;padding:8px 10px;text-align:left;font-weight:600;color:#555;font-size:11px}
.tbl td{border:1px solid #dee2e6;padding:8px 10px;color:#333}
.pill{display:inline-flex;font-size:11px;padding:2px 8px;border-radius:3px}
.pill-base{background:#cce5ff;color:#004085}
.pill-agendador{background:#d4edda;color:#155724}
.pill-supervisor{background:#fff3cd;color:#856404}
.fbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fbar select,.fbar input{font-size:13px;padding:8px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#333;min-height:38px;-webkit-appearance:none}
.fbar input{flex:1;min-width:120px}
.phdr{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:12px 14px;margin-bottom:12px}
.phdr h1{font-size:18px;font-weight:600;color:#333}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 18px;border-radius:6px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;z-index:9999;display:flex;align-items:center;gap:8px;color:#fff;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.25)}
.toast.show{opacity:1}
.loading{text-align:center;padding:2rem;color:#888;font-size:13px}
.loading i{font-size:24px;display:block;margin-bottom:8px;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-wrap">
    <div class="login-left">
      <svg viewBox="0 0 200 200" width="120" xmlns="http://www.w3.org/2000/svg">
        <polygon points="90,15 62,95 82,95 55,175 128,78 104,78 128,15" fill="#F5C400"/>
        <polygon points="108,15 80,95 100,95 73,175 146,78 122,78 146,15" fill="#D32F2F" opacity="0.88"/>
        <text x="100" y="158" font-family="Arial Black,Arial" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="1">ENGELMIG</text>
        <text x="100" y="176" font-family="Arial,sans-serif" font-weight="700" font-size="13" fill="#F5C400" text-anchor="middle" letter-spacing="3">ENERGIA</text>
      </svg>
      <p style="color:rgba(255,255,255,0.45);font-size:13px;margin-top:16px;text-align:center">Gestão de Manutenção de Frotas</p>
      <div style="display:flex;gap:24px;margin-top:20px">
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:var(--eng-yellow)" id="cnt-total">-</div><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-top:2px">Total</div></div>
        <div style="width:1px;background:rgba(255,255,255,0.1)"></div>
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:#28a745" id="cnt-agend">-</div><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-top:2px">Agendados</div></div>
        <div style="width:1px;background:rgba(255,255,255,0.1)"></div>
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:#ffc107" id="cnt-pend">-</div><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-top:2px">Pendentes</div></div>
      </div>
    </div>
    <div class="login-right">
      <div class="login-box">
        <div style="text-align:center;margin-bottom:1.2rem">
          <svg viewBox="0 0 160 55" width="120" xmlns="http://www.w3.org/2000/svg">
            <polygon points="52,4 38,40 50,40 34,52 76,20 62,20 74,4" fill="#F5C400"/>
            <polygon points="62,4 48,40 60,40 44,52 86,20 72,20 84,4" fill="#D32F2F" opacity="0.88"/>
            <text x="110" y="28" font-family="Arial Black,Arial" font-weight="900" font-size="15" fill="#1a2a4a" text-anchor="middle" letter-spacing="0.5">ENGELMIG</text>
            <text x="110" y="44" font-family="Arial,sans-serif" font-weight="700" font-size="9" fill="#2E7D32" text-anchor="middle" letter-spacing="2">ENERGIA</text>
          </svg>
          <div style="font-size:15px;font-weight:600;color:#333;margin-top:10px">Bem-vindo</div>
          <div style="font-size:12px;color:#888;margin-top:3px">Insira suas credenciais</div>
        </div>
        <div style="height:1px;background:#e8e8e8;margin:14px 0"></div>
        <div class="fg" style="margin-bottom:12px"><label>Usuário</label><input id="login-user" placeholder="seu.usuario" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="fg" style="margin-bottom:16px"><label>Senha</label><input id="login-pass" type="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn btn-dark btn-block" onclick="doLogin()"><i class="ti ti-login"></i> Entrar</button>

<!-- APP -->
<div id="screen-app" class="hidden">
  <div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="sb-brand">
        <div class="sb-logo">
          <svg viewBox="0 0 40 40" width="26" xmlns="http://www.w3.org/2000/svg">
            <polygon points="17,4 9,22 15,22 7,36 29,16 21,16 27,4" fill="#1a2a4a"/>

      </div>
      <div class="sb-user">
        <div class="sb-user-name" id="sb-name">Usuário</div>

      </div>

      <div class="sb-footer">
        <button class="btn-sair" onclick="doLogout()"><i class="ti ti-logout"></i> Sair do sistema</button>

        <div class="topbar-left">
          <button class="hamburger" onclick="openSidebar()"><i class="ti ti-menu-2"></i></button>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjwrP-6J_K2tH2ahzq1af0CwXHilDt14Y",
  authDomain: "engelmig-manutencao.firebaseapp.com",
  projectId: "engelmig-manutencao",
  storageBucket: "engelmig-manutencao.firebasestorage.app",
  messagingSenderId: "410804869470",
  appId: "1:410804869470:web:9a4a5b4ec48daf356e97cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DEFAULT_USERS = [
  {user:'agendador',pass:'agend123',nome:'WANDERSON JOSE DA COSTA',perfil:'agendador'},
  {user:'supervisor',pass:'sup123',nome:'SUPERVISOR',perfil:'supervisor'},
  {user:'base01',pass:'base123',nome:'BASE 01',perfil:'base'},
];

let me = null;
let sols = [];
let users = JSON.parse(localStorage.getItem('eng_users') || 'null') || [...DEFAULT_USERS];

function saveUsers(){ localStorage.setItem('eng_users', JSON.stringify(users)); }

// Restaura sessão ao recarregar
function restoreSession(){
  const saved = sessionStorage.getItem('eng_session');
  if(saved){
    const session = JSON.parse(saved);
    const f = users.find(x=>x.user===session.user&&x.pass===session.pass);
    if(f){
      me=f;
      hide('screen-login'); show('screen-app');
      document.getElementById('sb-name').textContent=f.nome;
      buildNav();
      return true;
    }
  }
  return false;
}

// Escuta solicitações em tempo real
function listenSols() {
  const q = query(collection(db, 'solicitacoes'), orderBy('ts', 'desc'));
  onSnapshot(q, (snapshot) => {
    sols = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
    updCnt();
    if(me) refreshPage();
  });
}

function updCnt(){
  document.getElementById('cnt-total').textContent = sols.length;
  document.getElementById('cnt-agend').textContent = sols.filter(s=>s.status==='Agendado').length;
  document.getElementById('cnt-pend').textContent = sols.filter(s=>s.status==='Pendente').length;
}

function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.innerHTML=`<i class="ti ti-${ok?'check':'alert-circle'}"></i>${msg}`;
  t.style.background=ok?'#28a745':'#dc3545';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}
function hide(id){document.getElementById(id).classList.add('hidden');}
function show(id){document.getElementById(id).classList.remove('hidden');}
function bdg(s){return{Pendente:'bdg-P',Agendado:'bdg-A',Cancelado:'bdg-C','Concluído':'bdg-F'}[s]||'bdg-P';}
function bic(s){return{Pendente:'ti-clock',Agendado:'ti-calendar-check',Cancelado:'ti-x','Concluído':'ti-circle-check'}[s]||'ti-clock';}
function tog(id){document.getElementById('b-'+id).classList.toggle('col');document.getElementById('c-'+id).classList.toggle('op');}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sb-overlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('show');}

window.tog=tog; window.openSidebar=openSidebar; window.closeSidebar=closeSidebar;

let currentPage = '';
function refreshPage(){ if(currentPage) go(currentPage, true); }

function doLogin(){
  const u=document.getElementById('login-user').value.trim().toLowerCase();
  const p=document.getElementById('login-pass').value;
  const f=users.find(x=>x.user.toLowerCase()===u&&x.pass===p);
  if(!f){document.getElementById('login-err').style.display='block';return;}
  document.getElementById('login-err').style.display='none';
  me=f;
  sessionStorage.setItem('eng_session', JSON.stringify({user:f.user, pass:f.pass}));
  hide('screen-login'); show('screen-app');
  document.getElementById('sb-name').textContent=f.nome;
  buildNav();
}
window.doLogin=doLogin;

function doLogout(){me=null;currentPage='';sessionStorage.removeItem('eng_session');hide('screen-app');show('screen-login');}
window.doLogout=doLogout;

const NAVS={
  base:[{id:'nova',icon:'ti-file-plus',label:'Autorização de Manutenção'},{id:'minhas',icon:'ti-list',label:'Minhas Solicitações'}],
  agendador:[{id:'pendentes',icon:'ti-clock',label:'Pendentes'},{id:'todas',icon:'ti-calendar',label:'Todas Solicitações'}],
  supervisor:[{id:'dashboard',icon:'ti-home',label:'Home'},{id:'historico',icon:'ti-history',label:'Histórico'},{id:'usuarios',icon:'ti-users',label:'Usuários'}],
};
const TITLES={nova:'Autorização de Manutenção',minhas:'Minhas Solicitações',pendentes:'Pendentes',todas:'Todas Solicitações',dashboard:'Home',historico:'Histórico',usuarios:'Usuários'};

function buildNav(){
  const nav=NAVS[me.perfil];
  const grp={base:'Manutenção',agendador:'Agendamento',supervisor:'Administração'}[me.perfil];
  document.getElementById('sb-nav').innerHTML=`<div class="nav-grp">${grp}</div>`+
    nav.map(n=>`<div class="nav-item" id="nav-${n.id}" onclick="go('${n.id}');closeSidebar()"><i class="ti ${n.icon}"></i>${n.label}</div>`).join('');
  go(nav[0].id);
}

function go(id, silent=false){
  currentPage=id;
  if(!silent){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const el=document.getElementById('nav-'+id);if(el)el.classList.add('active');
    document.getElementById('tb-title').textContent=TITLES[id]||id;
  }

function sendWhatsApp(id){
  const s=sols.find(x=>x.id===id);
  if(!s) return;
  const of_agendada=document.getElementById('m-of')?.value||s.of_agendada||'—';
  const dt_agendada=document.getElementById('m-dt')?.value||s.dt_agendada||'—';
  const protocolo=document.getElementById('m-prot')?.value||s.protocolo||'—';
  const status=document.getElementById('m-st')?.value||s.status;
  const tel=s.tel?.replace(/\D/g,'')||'';
  if(!tel){ toast('Contato não informado na solicitação.',false); return; }
  const msg=encodeURIComponent(
    `✅ *Engelmig Energia — Agendamento de Manutenção*\n\n`+
    `Olá, ${s.solicitante}!\n\n`+
    `Sua solicitação foi ${status.toLowerCase()}.\n\n`+
    `🚗 *Placa:* ${s.placa}\n`+
    `🔧 *Serviço:* ${s.tipo}\n`+
    `🏪 *Oficina:* ${of_agendada}\n`+
    `📅 *Data:* ${dt_agendada}\n`+
    `📋 *Protocolo Ticket Log:* ${protocolo}\n\n`+
    `Em caso de dúvidas, entre em contato com o agendador.`
  );
  window.open(`https://wa.me/55${tel}?text=${msg}`,'_blank');
}

        <div class="gr gr2">
          <div class="fg"><label>Nome completo</label><input id="nu-nome" placeholder="Nome Sobrenome"></div>
          <div class="fg"><label>Login</label><input id="nu-user" placeholder="nome.usuario" autocomplete="off"></div>
        </div>
        <div class="gr gr2">
          <div class="fg"><label>Senha</label><input id="nu-pass" type="password" placeholder="senha" autocomplete="new-password"></div>
          <div class="fg"><label>Perfil</label><select id="nu-perfil"><option value="base">Base</option><option value="agendador">Agendador</option><option value="supervisor">Supervisor</option></select></div>
        </div>
        <button class="btn btn-dark btn-sm" onclick="addUser()"><i class="ti ti-plus"></i> Adicionar</button>
      </div>
    </div>`;
  renderUsers();
}
window.pgUsers=pgUsers;

function renderUsers(){
  const el=document.getElementById('users-tbody');if(!el)return;
  el.innerHTML=users.map((u,i)=>`<tr>
    <td><strong>${u.nome}</strong></td><td style="color:#888">${u.user}</td>
    <td><span class="pill pill-${u.perfil}">${u.perfil}</span></td>
    <td>${u.user!=='supervisor'?`<button class="btn btn-sm" style="color:#dc3545;border-color:#dc3545;padding:3px 8px" onclick="remUser(${i})"><i class="ti ti-trash"></i></button>`:''}</td>
  </tr>`).join('');
}

function addUser(){
  const nome=document.getElementById('nu-nome').value.trim();
  const user=document.getElementById('nu-user').value.trim();
  const pass=document.getElementById('nu-pass').value;
  const perfil=document.getElementById('nu-perfil').value;
  if(!nome||!user||!pass){toast('Preencha todos os campos.',false);return;}
  if(users.find(u=>u.user.toLowerCase()===user.toLowerCase())){toast('Usuário já existe.',false);return;}
  users.push({user,pass,nome,perfil}); saveUsers(); renderUsers();
  ['nu-nome','nu-user','nu-pass'].forEach(id=>document.getElementById(id).value='');
  toast('Usuário adicionado!');
}
window.addUser=addUser;

function remUser(i){users.splice(i,1);saveUsers();renderUsers();toast('Usuário removido.');}
window.remUser=remUser;

// Inicia escuta em tempo real
listenSols();
// Tenta restaurar sessão
setTimeout(restoreSession, 500);
</script>
</body>
</html>
